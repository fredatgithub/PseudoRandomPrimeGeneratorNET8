name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PseudoRandomPrimeGeneratorNet8.sln

      - name: Build
        run: dotnet build PseudoRandomPrimeGeneratorNet8.sln --configuration Release --no-restore

      - name: Test (if any)
        run: dotnet test --no-build --verbosity normal
        continue-on-error: true
