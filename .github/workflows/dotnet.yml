name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PseudoRandomPrimeGeneratorNet8.sln

      - name: Build
        run: dotnet build PseudoRandomPrimeGeneratorNet8.sln --configuration Release --no-restore

      - name: Test (if any)
        run: dotnet test PseudoRandomPrimeGeneratorNet8.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
        continue-on-error: false

      - name: Convert coverage to opencover
        if: success()
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.1.23
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:Xml

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/coverage.cobertura.xml
            coverage-report

      - name: Configure git (required for Codecov commit operations)
        if: success()
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          # avoid failing entire CI if Codecov uploader has a non-critical error
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
